<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Explanation</title>
</head>
<body>
    
    <!--
    An event is an action performed by the user or the browser
    Examples of events:
    1.Clicking a button
    2.Typing in a text box
    3.Moving the mouse
    4.Submitting a form
    5.Pressing a key
    Js listens to this events and performance


    //Common events
    1.click -> user clicks an element
    2.submit ->form is submitted
    3.change ->input value changes
    4.keyup ->key is released
    5.keydown ->key is pressed
    6.mouseover ->mouse enters the element
    7.mouseout ->mouse leaves element
    -->
    <h1>Events Explanation </h1>
    <!--Inline event-->
    <button id="showMessage()">Click me</button>

    <hr>
    <form id="loginForm">
        <input
         type="text" 
         placeholder="Username"
         />
         <button>Submit</button>
    </form><br><br>
    <h3>Change Event Example</h3>
    <select id="course">
        <option>HTML</option>
        <option>CSS</option>
        <option>JS</option>
    </select>
    <h3>Color Picker Example</h3>
    <input type="color" id="colorPicker">
    <br><br>
    <h3>Keyup Example</h3>
    <input
    type="text"
     id="username"
     />
     <p id="count">0</p>
    <button id="switchOn">Switch on</button>
    <button id="a"></button>
    <script src="events.js"></script>
</body>
</html>
